<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  CEVAZ — Script del Cliente (google.script.run ↔ Apps Script)
// ═══════════════════════════════════════════════════════

// ─────────────────────────────────────
// ESTADO GLOBAL
// ─────────────────────────────────────
const App = {
  usuario:     "",
  rol:         "",           // "Administrador" | "SAC" | "Academia"
  casos:       [],           // cache de casos del servidor
  casoActivo:  null,         // objeto de caso seleccionado en el modal
  graficos:    {},           // referencias Chart.js
  ultimaActualizacion: null,
  timerId:     null,         // referencia al interval de auto-refresh
  timerIdEnVivo: null,       // timer para tab En Vivo
  casosEnVivoIds: new Set()  // IDs de casos pendientes vistos
};

// ─────────────────────────────────────
// ACCESO Y SESIÓN
// ─────────────────────────────────────

function accederAlSistema() {
  const nombre = document.getElementById("inputNombreAcceso").value.trim();
  const rol    = document.getElementById("selectRol").value;

  if (!nombre) { mostrarToast("Ingresa tu nombre para continuar.", "alerta"); return; }
  if (!rol)    { mostrarToast("Selecciona tu perfil de acceso.", "alerta"); return; }

  App.usuario = nombre;
  App.rol     = rol;

  document.getElementById("pantallaAcceso").style.display = "none";
  const appEl = document.getElementById("appPrincipal");
  appEl.classList.remove("app-oculta");
  appEl.classList.add("app-visible");

  document.getElementById("labelUsuario").textContent = nombre;
  document.getElementById("badgeRol").textContent     = rol;

  // Si es agente de departamento, ocultar filtro de departamento
  if (rol !== "Administrador") {
    document.getElementById("grupFiltroDep").style.display = "none";
    document.getElementById("filtroDepartamento").value    = rol;
    document.getElementById("tituloCasos").textContent = `Casos — ${rol}`;
    document.getElementById("btnMenuUsuarios").classList.add("oculto");
  } else {
    document.getElementById("btnMenuUsuarios").classList.remove("oculto");
  }

  cargarCasos();
  cargarEstadisticas();

  // Auto-refresh cada 7 minutos
  if (App.timerId) clearInterval(App.timerId);
  App.timerId = setInterval(() => {
    cargarCasos();
    cargarEstadisticas();
  }, 7 * 60 * 1000);
}

function cerrarSesion() {
  if (App.timerId) {
    clearInterval(App.timerId);
    App.timerId = null;
  }
  if (App.timerIdEnVivo) {
    clearInterval(App.timerIdEnVivo);
    App.timerIdEnVivo = null;
  }
  App.usuario = ""; App.rol = ""; App.casos = [];
  App.casosEnVivoIds = new Set();
  document.getElementById("appPrincipal").classList.remove("app-visible");
  document.getElementById("appPrincipal").classList.add("app-oculta");
  document.getElementById("pantallaAcceso").style.display = "flex";
  document.getElementById("inputNombreAcceso").value = "";
  document.getElementById("selectRol").value = "";
  cerrarUserMenu();
  cerrarModalUsuarios();
  cerrarModalUsuario();
}

// ─────────────────────────────────────
// NAVEGACIÓN POR TABS
// ─────────────────────────────────────

function cambiarTab(tabId) {
  document.querySelectorAll(".tab-contenido").forEach(s => s.classList.remove("tab-visible"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("tab-activo"));

  document.getElementById("tab-" + tabId).classList.add("tab-visible");
  document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add("tab-activo");

  if (tabId === "analitica") cargarEstadisticas();

  // Timer En Vivo
  if (tabId === "envivo") {
    cargarCasosEnVivo();
    if (!App.timerIdEnVivo) {
      App.timerIdEnVivo = setInterval(verificarCasosNuevosEnVivo, 7 * 60 * 1000);
    }
  } else {
    if (App.timerIdEnVivo) {
      clearInterval(App.timerIdEnVivo);
      App.timerIdEnVivo = null;
    }
  }
}

// ─────────────────────────────────────
// CARGA DE DATOS
// ─────────────────────────────────────

function recargarDatos() {
  App.casos = [];
  cargarCasos();
  cargarEstadisticas();
}

function limpiarFiltros() {
  document.getElementById("filtroSede").value = "Todos";
  document.getElementById("filtroDepartamento").value = "Todos";
  document.getElementById("filtroEstado").value = "Todos";
  document.getElementById("filtroFechaDesde").value = "";
  document.getElementById("filtroFechaHasta").value = "";
  document.getElementById("inputBusqueda").value = "";
  aplicarFiltros();
}

function cargarCasos() {
  mostrarCarga(true);

  const filtros = obtenerFiltros();

  google.script.run
    .withSuccessHandler(recibirCasos)
    .withFailureHandler(err => {
      mostrarCarga(false);
      mostrarToast("Error al cargar casos: " + err.message, "error");
    })
    .getCasos(filtros);
}

function recibirCasos(casos) {
  App.casos = casos || [];
  App.ultimaActualizacion = new Date();

  mostrarCarga(false);
  actualizarKPIs(App.casos);
  renderizarTabla(App.casos);

  const metaEl = document.getElementById("metaActualizacion");
  if (metaEl) {
    metaEl.textContent = "Actualizado: " + App.ultimaActualizacion.toLocaleTimeString("es-VE");
  }
}

function aplicarFiltros() {
  const filtros = obtenerFiltros();

  google.script.run
    .withSuccessHandler(recibirCasos)
    .withFailureHandler(err => mostrarToast("Error al filtrar: " + err.message, "error"))
    .getCasos(filtros);
}

function obtenerFiltros() {
  return {
    sede:         document.getElementById("filtroSede")?.value || "Todos",
    departamento: document.getElementById("filtroDepartamento")?.value || "Todos",
    estado:       document.getElementById("filtroEstado")?.value || "Todos",
    fechaDesde:   document.getElementById("filtroFechaDesde")?.value || "",
    fechaHasta:   document.getElementById("filtroFechaHasta")?.value || ""
  };
}

// ─────────────────────────────────────
// KPIs
// ─────────────────────────────────────

function actualizarKPIs(casos) {
  const total = casos.length;
  let pendiente = 0, proceso = 0, resuelto = 0;
  for (const c of casos) {
    if (c.estado === "Pendiente") pendiente++;
    else if (c.estado === "En Proceso") proceso++;
    else if (c.estado === "Resuelto") resuelto++;
  }
  animarNumero("kpiTotal",     total);
  animarNumero("kpiPendiente", pendiente);
  animarNumero("kpiProceso",   proceso);
  animarNumero("kpiResuelto",  resuelto);
}

function animarNumero(id, destino) {
  const el = document.getElementById(id);
  if (!el) return;
  const inicio = parseInt(el.textContent) || 0;
  const pasos  = 20;
  let paso = 0;
  const intervalo = setInterval(() => {
    paso++;
    el.textContent = Math.round(inicio + (destino - inicio) * (paso / pasos));
    if (paso >= pasos) { el.textContent = destino; clearInterval(intervalo); }
  }, 20);
}

// ─────────────────────────────────────
// TABLA DE CASOS
// ─────────────────────────────────────

function renderizarTabla(casos) {
  const tbody    = document.getElementById("cuerpoCasos");
  const vacioEl  = document.getElementById("estadoVacio");
  const tablaEl  = document.getElementById("tablaWrapper");

  tbody.innerHTML = "";

  if (!casos || casos.length === 0) {
    vacioEl.classList.remove("oculto");
    tablaEl.classList.add("oculto");
    return;
  }

  vacioEl.classList.add("oculto");
  tablaEl.classList.remove("oculto");

  casos.forEach(caso => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong style="color:var(--azul-claro);font-size:.8rem">${esc(caso.idCaso)}</strong></td>
      <td>${esc(caso.fechaRegistro)}</td>
      <td title="${esc(caso.nombreAlumno)}">${esc(truncar(caso.nombreAlumno, 22))}</td>
      <td>${esc(truncar(caso.sede.replace("CEVAZ ", ""), 16))}</td>
      <td title="${esc(caso.areaPrograma)}">${esc(truncar(caso.areaPrograma, 18))}</td>
      <td><span class="badge badge-${(caso.departamento || "").toLowerCase()}">${esc(caso.departamento || "")}</span></td>
      <td><span class="badge ${(caso.tipoPlanteamiento || "").includes("QUEJA") ? "badge-queja" : "badge-sugerencia"}">
        ${(caso.tipoPlanteamiento || "").includes("QUEJA") ? "Queja" : "Sugerencia"}
      </span></td>
      <td><span class="badge ${badgeEstado(caso.estado)}">${esc(caso.estado)}</span></td>
      <td>${esc(truncar(caso.personal, 18)) || '<span style="color:var(--texto-extra)">—</span>'}</td>
      <td class="acciones-celda">${generarBotonesAccion(caso)}</td>
    `;
    tbody.appendChild(tr);
  });
}

  if (caso.telefono) {

      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

  if (caso.emailContacto) {

    </a>`;
  }

}

// ─────────────────────────────────────
// BÚSQUEDA LOCAL
// ─────────────────────────────────────

function buscarCasos() {
  const query = document.getElementById("inputBusqueda").value.toLowerCase().trim();
  if (!query) { renderizarTabla(App.casos); return; }

  const filtrados = App.casos.filter(c =>
    c.nombreAlumno.toLowerCase().includes(query)  ||
    c.idCaso.toLowerCase().includes(query)        ||
    c.areaPrograma.toLowerCase().includes(query)  ||
    c.idAlumno.toString().toLowerCase().includes(query) ||
    c.sede.toLowerCase().includes(query)          ||
    c.descripcion.toLowerCase().includes(query)
  );
  renderizarTabla(filtrados);
}

// ─────────────────────────────────────
// MODAL — VER DETALLE
// ─────────────────────────────────────

function abrirDetalle(filaNum) {
  const caso = App.casos.find(c => c.fila === filaNum);
  if (!caso) return;
  App.casoActivo = caso;

  const esMiDep = App.rol === "Administrador" || caso.departamento === App.rol;

  document.getElementById("modalTitulo").textContent = `Caso ${caso.idCaso}`;

  document.getElementById("modalCuerpo").innerHTML = `
    <div class="detalle-grid">
      <div><p class="detalle-campo">Alumno</p><p class="detalle-valor">${esc(caso.nombreAlumno)}</p></div>
      <div><p class="detalle-campo">ID Alumno</p><p class="detalle-valor">${esc(caso.idAlumno) || "—"}</p></div>
      <div><p class="detalle-campo">Fecha de Registro</p><p class="detalle-valor">${esc(caso.fechaRegistro)}</p></div>
      <div><p class="detalle-campo">Estado</p><p class="detalle-valor"><span class="badge ${badgeEstado(caso.estado)}">${esc(caso.estado)}</span></p></div>
      <div><p class="detalle-campo">Sede</p><p class="detalle-valor">${esc(caso.sede)}</p></div>
      <div><p class="detalle-campo">Área / Programa</p><p class="detalle-valor">${esc(caso.areaPrograma)}</p></div>
      <div><p class="detalle-campo">Departamento</p><p class="detalle-valor"><span class="badge badge-${(caso.departamento || "").toLowerCase()}">${esc(caso.departamento || "")}</span></p></div>
      <div><p class="detalle-campo">Tipo</p><p class="detalle-valor">${esc(caso.tipoPlanteamiento)}</p></div>
      <div><p class="detalle-campo">Nivel</p><p class="detalle-valor">${esc(caso.nivel) || "—"}</p></div>
      <div><p class="detalle-campo">Categoría</p><p class="detalle-valor">${esc(caso.categoriaCurso) || "—"}</p></div>
      <div><p class="detalle-campo">Profesor</p><p class="detalle-valor">${esc(caso.profesor) || "—"}</p></div>
      <div><p class="detalle-campo">Horario</p><p class="detalle-valor">${esc(caso.horario) || "—"}</p></div>
      <div><p class="detalle-campo">Email Contacto</p><p class="detalle-valor">${caso.emailContacto ? `<a href="mailto:${caso.emailContacto}" class="detalle-link">${esc(caso.emailContacto)}</a>` : "—"}</p></div>
      <div><p class="detalle-campo">Teléfono</p><p class="detalle-valor">${caso.telefono ? `<a href="https://wa.me/${cleanPhone(caso.telefono)}" target="_blank" class="detalle-link">${esc(caso.telefono)}</a>` : "—"}</p></div>
      ${caso.personal ? `<div><p class="detalle-campo">Atendido por</p><p class="detalle-valor">${esc(caso.personal)}</p></div>` : ""}
      ${caso.fechaResolucion ? `<div><p class="detalle-campo">Fecha Resolución</p><p class="detalle-valor">${esc(caso.fechaResolucion)}</p></div>` : ""}
      ${caso.tiempoRespuesta ? `<div><p class="detalle-campo">Tiempo de Respuesta</p><p class="detalle-valor">${esc(caso.tiempoRespuesta)}</p></div>` : ""}
    </div>
    <p class="detalle-campo">Descripción del caso</p>
    <div class="detalle-descripcion">${esc(caso.descripcion)}</div>

      <div class="detalle-descripcion detalle-accion">${esc(caso.accionSolicitada)}</div>

    ${caso.comentarios ? `

    } else if (caso.estado === "En Proceso") {

// ─────────────────────────────────────
// MODAL — TOMAR CASO
// ─────────────────────────────────────

function abrirModalTomar(filaNum) {
  const caso = App.casos.find(c => c.fila === filaNum);
  if (!caso) return;
  App.casoActivo = caso;

  document.getElementById("modalTitulo").textContent = "Tomar Caso";
  document.getElementById("modalCuerpo").innerHTML = `
    <p class="modal-confirmacion">
      Confirma que tomarás el caso <strong>${esc(caso.idCaso)}</strong> de <strong>${esc(caso.nombreAlumno)}</strong>.
    </p>
    <div class="campo-grupo">
      <label class="campo-label" for="inputPersonalTomar">Tu nombre completo</label>
      <input type="text" id="inputPersonalTomar" class="campo-input"
        value="${esc(App.usuario)}" placeholder="Nombre del agente que toma el caso">
    </div>
  `;
  document.getElementById("modalPie").innerHTML = `
    <button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>
    <button class="btn btn-accion" id="btnConfirmarTomar" onclick="confirmarTomarCaso()">
      Confirmar — Tomar Caso
    </button>
  `;
  abrirModal();
}

function confirmarTomarCaso() {
  const personal = document.getElementById("inputPersonalTomar").value.trim();
  if (!personal) { mostrarToast("Ingresa tu nombre.", "alerta"); return; }

  const btn = document.getElementById("btnConfirmarTomar");
  btn.disabled = true;
  btn.textContent = "Guardando…";

  google.script.run
    .withSuccessHandler(res => {
      cerrarModal();
      if (res.exito) {
        mostrarToast(res.mensaje, "exito");
        cargarCasos();
      } else {
        mostrarToast(res.mensaje, "error");
      }
    })
    .withFailureHandler(err => {
      btn.disabled = false; btn.textContent = "Confirmar — Tomar Caso";
      mostrarToast("Error del servidor: " + err.message, "error");
    })
    .tomarCaso(App.casoActivo.fila, personal, App.rol);
}

// ─────────────────────────────────────
// MODAL — RESOLVER CASO
// ─────────────────────────────────────

function abrirModalResolver(filaNum) {
  const caso = App.casos.find(c => c.fila === filaNum);
  if (!caso) return;
  App.casoActivo = caso;

  document.getElementById("modalTitulo").textContent = "Resolver Caso";
  document.getElementById("modalCuerpo").innerHTML = `
    <p style="margin-bottom:16px;color:var(--texto-suave);font-size:.9rem">
      Cierra el caso <strong>${esc(caso.idCaso)}</strong>. Esta acción es permanente.
    </p>
    <div class="campo-grupo">
      <label class="campo-label" for="inputPersonalResolver">Tu nombre completo</label>
      <input type="text" id="inputPersonalResolver" class="campo-input"
        value="${esc(caso.personal || App.usuario)}" placeholder="Nombre del agente que resolvió">
    </div>
    <div class="campo-grupo">
      <label class="campo-label" for="textareaComentarios">
        Comentarios de solución <span class="campo-obligatorio">*</span>
      </label>
      <textarea id="textareaComentarios" class="campo-input"
        rows="4"
        placeholder="Describe detalladamente la solución aplicada…"
        class="campo-input campo-textarea-solucion"></textarea>
    </div>
  `;
  document.getElementById("modalPie").innerHTML = `
    <button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>
    <button class="btn btn-exito" id="btnConfirmarResolver" onclick="confirmarResolverCaso()">
      Marcar como Resuelto
    </button>
  `;
  abrirModal();
}

function confirmarResolverCaso() {
  const personal    = document.getElementById("inputPersonalResolver").value.trim();
  const comentarios = document.getElementById("textareaComentarios").value.trim();

  if (!personal)    { mostrarToast("Ingresa tu nombre.", "alerta"); return; }
  if (!comentarios) { mostrarToast("Los comentarios son obligatorios.", "alerta"); return; }

  const btn = document.getElementById("btnConfirmarResolver");
  btn.disabled = true;
  btn.textContent = "Guardando…";

  google.script.run
    .withSuccessHandler(res => {
      cerrarModal();
      if (res.exito) {
        mostrarToast(res.mensaje, "exito");
        cargarCasos();
      } else {
        mostrarToast(res.mensaje, "error");
      }
    })
    .withFailureHandler(err => {
      btn.disabled = false; btn.textContent = "Marcar como Resuelto";
      mostrarToast("Error del servidor: " + err.message, "error");
    })
    .resolverCaso(App.casoActivo.fila, personal, comentarios, App.rol);
}

// ─────────────────────────────────────
// CONTROL DEL MODAL
// ─────────────────────────────────────

function abrirModal() {
  document.getElementById("modalFondo").classList.remove("oculto");
  document.body.style.overflow = "hidden";
}
function cerrarModal() {
  document.getElementById("modalFondo").classList.add("oculto");
  document.body.style.overflow = "";
  App.casoActivo = null;
}
function cerrarModalSiFondo(e) {
  if (e.target.id === "modalFondo") cerrarModal();
}
document.addEventListener("keydown", e => { if (e.key === "Escape") cerrarModal(); });

// ─────────────────────────────────────
// ANALÍTICA — GRÁFICOS
// ─────────────────────────────────────

function cargarEstadisticas() {
  google.script.run
    .withSuccessHandler(renderizarGraficos)
    .withFailureHandler(err => mostrarToast("Error al cargar estadísticas: " + err.message, "error"))
    .getEstadisticas();
}

function renderizarGraficos(stats) {
  if (!stats || stats.error) return;

  const COLORES = {
    azul:   "#2D7DD2",
    dorado: "#C9973A",
    verde:  "#1A9E6B",
    naranja:"#D97706",
    rojo:   "#C0392B",
    morado: "#6B46C1",
    celeste:"#0891B2"
  };
  const PALETA = [COLORES.azul, COLORES.dorado, COLORES.verde, COLORES.naranja, COLORES.rojo, COLORES.morado, COLORES.celeste];

  const opcBase = {
    responsive: true,
    maintainAspectRatio: true,
    plugins: { legend: { labels: { font: { family: "'Inter', sans-serif", size: 12 }, boxWidth: 12 } } }
  };

  // 1. Por Estado (doughnut)
  crearGrafico("graficoPorEstado", "doughnut", {
    labels: ["Pendiente", "En Proceso", "Resuelto"],
    datasets: [{
      data: [
        stats.porEstado["Pendiente"]  || 0,
        stats.porEstado["En Proceso"] || 0,
        stats.porEstado["Resuelto"]   || 0
      ],
      backgroundColor: [COLORES.naranja, COLORES.azul, COLORES.verde],
      borderWidth: 2,
      borderColor: "#fff"
    }]
  }, { ...opcBase, cutout: "65%" });

  // 2. Por Departamento (bar)
  crearGrafico("graficoDepartamento", "bar", {
    labels: Object.keys(stats.porDepartamento),
    datasets: [{
      label: "Casos",
      data: Object.values(stats.porDepartamento),
      backgroundColor: [COLORES.morado, COLORES.azul],
      borderRadius: 6
    }]
  }, { ...opcBase, plugins: { ...opcBase.plugins, legend: { display: false } },
    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } });

  // 3. Por Sede (pie)
  const sedesKeys = Object.keys(stats.porSede);
  crearGrafico("graficoSede", "pie", {
    labels: sedesKeys.map(s => s.replace("CEVAZ ", "")),
    datasets: [{
      data: Object.values(stats.porSede),
      backgroundColor: PALETA.slice(0, sedesKeys.length),
      borderWidth: 2,
      borderColor: "#fff"
    }]
  }, opcBase);

  // 4. Por Área (bar horizontal)
  const areasKeys = Object.keys(stats.porArea).sort((a,b) => stats.porArea[b] - stats.porArea[a]);
  crearGrafico("graficoArea", "bar", {
    labels: areasKeys,
    datasets: [{
      label: "Casos",
      data: areasKeys.map(k => stats.porArea[k]),
      backgroundColor: COLORES.azul + "CC",
      borderColor: COLORES.azul,
      borderWidth: 1,
      borderRadius: 4
    }]
  }, { ...opcBase,
    indexAxis: "y",
    plugins: { ...opcBase.plugins, legend: { display: false } },
    scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } }
  });

  // 5. Por Nivel (bar)
  const nivelesKeys = Object.keys(stats.porNivel).sort();
  crearGrafico("graficoNivel", "bar", {
    labels: nivelesKeys,
    datasets: [{
      label: "Casos",
      data: nivelesKeys.map(k => stats.porNivel[k]),
      backgroundColor: COLORES.dorado + "BB",
      borderColor: COLORES.dorado,
      borderWidth: 1,
      borderRadius: 4
    }]
  }, { ...opcBase,
    plugins: { ...opcBase.plugins, legend: { display: false } },
    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
  });

  // 6. Tiempo Promedio por Departamento (bar)
  const depsTiempo = Object.keys(stats.tiempoPromedioHoras);
  crearGrafico("graficoTiempo", "bar", {
    labels: depsTiempo,
    datasets: [{
      label: "Horas promedio",
      data: depsTiempo.map(d => stats.tiempoPromedioHoras[d]),
      backgroundColor: [COLORES.morado + "BB", COLORES.celeste + "BB"],
      borderColor:     [COLORES.morado, COLORES.celeste],
      borderWidth: 1,
      borderRadius: 6
    }]
  }, { ...opcBase,
    plugins: { ...opcBase.plugins, legend: { display: false } },
    scales: { y: { beginAtZero: true, title: { display: true, text: "Horas" } } }
  });
}

function crearGrafico(canvasId, tipo, datos, opciones) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (App.graficos[canvasId]) { App.graficos[canvasId].destroy(); }
  App.graficos[canvasId] = new Chart(canvas.getContext("2d"), {
    type: tipo, data: datos, options: opciones
  });
}

function badgeEstado(estado) {
  const map = { "Pendiente": "badge-pendiente", "En Proceso": "badge-en-proceso", "Resuelto": "badge-resuelto" };
  return map[estado] || "badge-pendiente";
}

function esc(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function truncar(str, max) {
  if (!str) return "";
  return str.length > max ? str.slice(0, max) + "…" : str;
}

// ─────────────────────────────────────

function cleanPhone(phone) {
  if (!phone) return "#";
  let cleaned = String(phone).replace(/[\s\-\(\)\.]/g, "");
  if (cleaned.startsWith("0")) cleaned = "+58" + cleaned.slice(1);
  else if (cleaned.startsWith("58") && !cleaned.startsWith("+")) cleaned = "+" + cleaned;
  else if (!cleaned.startsWith("+")) cleaned = "+58" + cleaned;
  return cleaned;
}

function cargarCasosEnVivo() {
  const cargaEl = document.getElementById("envivoEstadoCarga");
  const vacioEl = document.getElementById("envivoEstadoVacio");
  const tablaEl = document.getElementById("envivoTablaWrapper");

  cargaEl.classList.remove("oculto");
  vacioEl.classList.add("oculto");
  tablaEl.classList.add("oculto");

  const filtros = { estado: "Pendiente" };
  if (App.rol !== "Administrador") {
    filtros.departamento = App.rol;
  }

  google.script.run
    .withSuccessHandler(casos => {
      cargaEl.classList.add("oculto");

      if (!casos || casos.length === 0) {
        vacioEl.classList.remove("oculto");
        tablaEl.classList.add("oculto");
        App.casosEnVivoIds = new Set();
        return;
      }

      // Detectar casos nuevos antes de actualizar el Set
      if (App.casosEnVivoIds.size > 0) {
        const nuevosIds = casos.filter(c => !App.casosEnVivoIds.has(c.idCaso));
        if (nuevosIds.length > 0) {
          mostrarNotificacionEnvivo(nuevosIds[0], nuevosIds.length);
        }
      }

      // Guardar IDs actuales
      App.casosEnVivoIds = new Set(casos.map(c => c.idCaso));

      tablaEl.classList.remove("oculto");
      renderizarTablaEnvivo(casos);

      const metaEl = document.getElementById("metaEnvivo");
      if (metaEl) {
        metaEl.textContent = "Última actualización: " + new Date().toLocaleTimeString("es-VE");
      }
    })
    .withFailureHandler(err => {
      cargaEl.classList.add("oculto");
      mostrarToast("Error al cargar casos pendientes: " + err.message, "error");
    })
    .getCasos(filtros);
}

function verificarCasosNuevosEnVivo() {
  const filtros = { estado: "Pendiente" };
  if (App.rol !== "Administrador") {
    filtros.departamento = App.rol;
  }

  google.script.run
    .withSuccessHandler(casos => {
      if (!casos || casos.length === 0) {
        App.casosEnVivoIds = new Set();
        renderizarTablaEnvivo([]);
        return;
      }

      const nuevosIds = casos.filter(c => !App.casosEnVivoIds.has(c.idCaso));

      // Actualizar IDs conocidos
      App.casosEnVivoIds = new Set(casos.map(c => c.idCaso));

      // Renderizar tabla
      renderizarTablaEnvivo(casos);

      // Actualizar timestamp
      const metaEl = document.getElementById("metaEnvivo");
      if (metaEl) {
        metaEl.textContent = "Última actualización: " + new Date().toLocaleTimeString("es-VE");
      }

      // Notificar solo si hay casos nuevos
      if (nuevosIds.length > 0) {
        mostrarNotificacionEnvivo(nuevosIds[0], nuevosIds.length);
      }
    })
    .withFailureHandler(err => {
      mostrarToast("Error al verificar casos nuevos: " + err.message, "error");
    })
    .getCasos(filtros);
}

function esCasoReciente(fechaRegistro) {
  if (!fechaRegistro) return false;
  try {
    const partes = fechaRegistro.split(" ");
    const fechaPart = partes[0].split("/");
    const horaPart = partes[1] || "00:00";
    const [hora, minuto] = horaPart.split(":");
    const fechaCaso = new Date(
      parseInt(fechaPart[2]),
      parseInt(fechaPart[1]) - 1,
      parseInt(fechaPart[0]),
      parseInt(hora),
      parseInt(minuto)
    );
    const ahora = new Date();
    const diffMinutos = (ahora - fechaCaso) / 60000;
    return diffMinutos <= 10;
  } catch {
    return false;
  }
}

function mostrarNotificacionEnvivo(caso, cantidad) {
  if (!caso) return;
  const contenedor = document.getElementById("toastContainer");
  const esQueja = (caso.tipoPlanteamiento || "").includes("QUEJA");
  const toast = document.createElement("div");
  toast.className = `toast ${esQueja ? "toast-queja" : "toast-sugerencia"}`;
  toast.innerHTML = `
    <div class="toast-whatsapp-titulo">${esQueja ? "Queja" : "Sugerencia"}</div>
    <div class="toast-whatsapp-id">${esc(caso.idCaso)}</div>
    <div class="toast-whatsapp-info">${esc(caso.nombreAlumno)} — ${esc(caso.sede.replace("CEVAZ ", ""))}</div>
    ${cantidad > 1 ? `<div class="toast-whatsapp-info">+${cantidad - 1} caso(s) más</div>` : ''}
  `;
  contenedor.appendChild(toast);
  setTimeout(() => toast.remove(), 8000);
}

  google.script.run
    .withSuccessHandler(usuarios => {
      AppUsuarios.lista = usuarios || [];
      renderizarTablaUsuarios();

function renderizarTablaUsuarios() {
  const tbody = document.getElementById("usuariosCuerpo");
  const vacio = document.getElementById("usuariosEstadoVacio");

  let items = AppUsuarios.lista.map((u, i) => ({ ...u, _idx: i }));
  if (AppUsuarios.filtro) {
    const q = AppUsuarios.filtro.toLowerCase();
    items = items.filter(u =>
      u.nombre.toLowerCase().includes(q) ||
      u.correo.toLowerCase().includes(q)
    );
  }

  if (items.length === 0) {
    tbody.innerHTML = "";
    vacio.classList.remove("oculto");
    return;
  }
  vacio.classList.add("oculto");

  tbody.innerHTML = items.map(u => `
    <tr>
      <td>${esc(u.nombre)}</td>
      <td>${esc(u.sede.replace("CEVAZ ", ""))}</td>
      <td>${esc(u.departamento)}</td>
      <td>${esc(u.rol)}</td>
      <td class="usuarios-col-acciones">
        <div class="usuarios-acciones">
          <button onclick="abrirModalEditarUsuario(${u.fila}, ${u._idx})" title="Editar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-eliminar" onclick="confirmarEliminarUsuario(${u.fila}, '${esc(u.nombre).replace(/'/g, "\\'")}')" title="Eliminar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </td>
    </tr>
  `).join("");
}

function abrirModalEditarUsuario(fila, indice) {
  const usuario = AppUsuarios.lista[indice];
  if (!usuario) return;
  document.getElementById("modalUsuarioTitulo").textContent = "Editar Usuario";
  document.getElementById("usuarioFilaEdit").value = fila;
  document.getElementById("inputUsuarioNombre").value = usuario.nombre;
  document.getElementById("inputUsuarioCorreo").value = usuario.correo;
  document.getElementById("inputUsuarioTelefono").value = usuario.telefono;
  document.getElementById("selectUsuarioSede").value = usuario.sede;
  document.getElementById("selectUsuarioDepto").value = usuario.departamento;
  document.getElementById("selectUsuarioRol").value = usuario.rol;
  document.getElementById("modalUsuarioFondo").classList.remove("oculto");
}

function guardarUsuario() {
  const fila    = document.getElementById("usuarioFilaEdit").value;
  const nombre  = document.getElementById("inputUsuarioNombre").value.trim();
  const correo  = document.getElementById("inputUsuarioCorreo").value.trim();
  const telefono = document.getElementById("inputUsuarioTelefono").value.trim();
  const sede    = document.getElementById("selectUsuarioSede").value;
  const depto   = document.getElementById("selectUsuarioDepto").value;
  const rol     = document.getElementById("selectUsuarioRol").value;

  if (!nombre) { mostrarToast("El nombre es obligatorio.", "alerta"); return; }
  if (!correo) { mostrarToast("El correo es obligatorio.", "alerta"); return; }
  if (!sede)   { mostrarToast("Selecciona una sede.", "alerta"); return; }
  if (!depto)  { mostrarToast("Selecciona un departamento.", "alerta"); return; }
  if (!rol)    { mostrarToast("Selecciona un rol / cargo.", "alerta"); return; }

  const usuario = { nombre, correo, telefono, sede, departamento: depto, rol };

  const esEdicion = !!fila;
  const btnGuardar = document.querySelector("#modalUsuarioFondo .btn-exito");

  // Deshabilitar botón y mostrar loading
  btnGuardar.disabled = true;
  btnGuardar.textContent = "Guardando...";

  const handler = (res) => {
    btnGuardar.disabled = false;
    btnGuardar.textContent = "Guardar";
    if (res.exito) {
      mostrarToast(res.mensaje, "exito");
      cerrarModalUsuario();
      cargarUsuarios();
    } else {
      mostrarToast(res.mensaje, "error");
    }
  };

  const errorHandler = (err) => {
    btnGuardar.disabled = false;
    btnGuardar.textContent = "Guardar";
    mostrarToast("Error: " + err.message, "error");
  };

  if (esEdicion) {
    google.script.run
      .withSuccessHandler(handler)
      .withFailureHandler(errorHandler)
      .editarUsuario(parseInt(fila), usuario);
  } else {
    google.script.run
      .withSuccessHandler(handler)
      .withFailureHandler(errorHandler)
      .crearUsuario(usuario);
  }
}

function ejecutarEliminarUsuario(fila) {
  google.script.run
    .withSuccessHandler(res => {
      if (res.exito) {
        mostrarToast(res.mensaje, "exito");
        cerrarModal();
        cargarUsuarios();
      } else {
        mostrarToast(res.mensaje, "error");
      }

    .withFailureHandler(err => mostrarToast("Error: " + err.message, "error"))
    .eliminarUsuario(fila);
}
